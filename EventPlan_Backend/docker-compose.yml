
services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # This syncs your local folder to the container so you don't have to rebuild on every code change
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: eventplan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
